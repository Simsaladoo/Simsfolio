name: Update Steam Workshop Stats

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write  # ← Add this!

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: main  # ← Explicitly checkout main

      - name: Fetch Steam Workshop Data
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        run: |
          # Force Steam ID as string with quotes
          STEAM_ID="${{ secrets.STEAM_USER_ID }}"
          
          curl -s "https://api.steampowered.com/IPublishedFileService/GetUserFiles/v1/?key=${STEAM_API_KEY}&steamid=${STEAM_ID}&appid=0&numperpage=100&return_details=true" \
            | jq '.response.publishedfiledetails | map({
                id: .publishedfileid,
                title: .title,
                views: .views,
                subscriptions: .subscriptions,
                favorited: .favorited,
                lifetime_subscriptions: .lifetime_subscriptions,
                lifetime_favorited: .lifetime_favorited
              })' > _data/steam_workshop.json

      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add _data/steam_workshop.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update Steam Workshop stats [skip ci]"
          git push origin main